<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" role="img" aria-label="useless.exe">
  <title>useless.exe — spider web</title>

  <!-- Subtle dark backdrop circle so the web reads on any tab color -->
  <circle cx="32" cy="32" r="31" fill="#050b1f"/>

  <!-- Web (cyan) -->
  <g fill="none" stroke="#00e5ff" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round">
    <!-- 8 radial spokes -->
    <line x1="32" y1="32" x2="32" y2="2"/>
    <line x1="32" y1="32" x2="53.21" y2="10.79"/>
    <line x1="32" y1="32" x2="62" y2="32"/>
    <line x1="32" y1="32" x2="53.21" y2="53.21"/>
    <line x1="32" y1="32" x2="32" y2="62"/>
    <line x1="32" y1="32" x2="10.79" y2="53.21"/>
    <line x1="32" y1="32" x2="2" y2="32"/>
    <line x1="32" y1="32" x2="10.79" y2="10.79"/>

    <!-- 3 concentric web rings (octagons connecting the spokes) -->
    <polygon points="32,22 39.07,24.93 42,32 39.07,39.07 32,42 24.93,39.07 22,32 24.93,24.93"/>
    <polygon points="32,12 46.14,17.86 52,32 46.14,46.14 32,52 17.86,46.14 12,32 17.86,17.86"/>
    <polygon points="32,2  53.21,10.79 62,32 53.21,53.21 32,62 10.79,53.21 2,32 10.79,10.79"/>
  </g>

  <!-- Tiny amber spider in the center -->
  <g transform="translate(32 32)" fill="#ffb703" stroke="#ffb703" stroke-width="0.9" stroke-linecap="round">
    <ellipse cx="0" cy="0" rx="2.4" ry="3"/>
    <g fill="none">
      <path d="M-2.2 -1.8 L-5 -4 M-2.6 -0.3 L-6 -0.8 M-2.6 1.2 L-6 2 M-2.2 2.5 L-5 4"/>
      <path d="M 2.2 -1.8 L 5 -4  M 2.6 -0.3 L 6 -0.8 M 2.6 1.2 L 6 2  M 2.2 2.5 L 5 4"/>
    </g>
  </g>
</svg>
